# 权限 API 测试用配置：与主配置一致，使用同一 PostgreSQL（不改表结构）
server.port=0
spring.datasource.url=${spring.datasource.url:jdbc:postgresql://localhost:5432/evidence}
spring.datasource.username=${spring.datasource.username:evidence}
spring.datasource.password=${spring.datasource.password:Evidence@123456}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
file.upload.base-path=./data/uploads-test
logging.level.com.bwbcomeon.evidence=INFO
