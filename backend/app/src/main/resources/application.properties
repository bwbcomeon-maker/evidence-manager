# Server
server.port=${SERVER_PORT:8081}

# Session（登录鉴权）
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=30m

# Datasource (PostgreSQL - Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/evidence}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:evidence}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Evidence@123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# MyBatis
mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=com.bwbcomeon.evidence
mybatis.type-handlers-package=com.bwbcomeon.evidence.typehandler

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.org.mybatis=${MYBATIS_LOG_LEVEL:DEBUG}
logging.level.com.bwbcomeon.evidence=${APP_LOG_LEVEL:DEBUG}
spring.application.name=evidence-manager

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
file.upload.base-path=${FILE_UPLOAD_BASE_PATH:./data/uploads}

# Evidence image watermark
evidence.image.watermark.enabled=true
# 下载原图：系统开关；开启后仅 SYSTEM_ADMIN、PMO 可访问 variant=ORIGINAL
evidence.image.original-access-enabled=true

# 首个系统管理员安全引导（仅在新环境/恢复时按需开启，避免固定默认口令）
security.bootstrap-admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
security.bootstrap-admin.username=${BOOTSTRAP_ADMIN_USERNAME:}
security.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
security.bootstrap-admin.real-name=${BOOTSTRAP_ADMIN_REAL_NAME:系统管理员}

# 水印文案（可配置，为空时使用下方默认值）
evidence.image.watermark.system-name=项目交付证据管理系统
evidence.image.watermark.label-project=项目
evidence.image.watermark.label-uploader=上传人
evidence.image.watermark.label-upload-time=上传时间
evidence.image.watermark.footer=仅供项目内部使用
evidence.image.watermark.fallback-unknown-project=未知
evidence.image.watermark.fallback-unknown-uploader=未知
