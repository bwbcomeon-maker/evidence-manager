services:
  db:
    image: postgres:16
    container_name: evidence-db
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PGTZ: ${TZ:-Asia/Shanghai}
      POSTGRES_DB: ${POSTGRES_DB:-evidence}
      POSTGRES_USER: ${POSTGRES_USER:-evidence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${HOST_POSTGRES_DATA:-/opt/evidence-manager/data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - evidence-net

  backend:
    image: evidence-manager-backend:offline
    container_name: evidence-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: 8081
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-evidence}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-evidence}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      FILE_UPLOAD_BASE_PATH: /app/data/uploads
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      MYBATIS_LOG_LEVEL: ${MYBATIS_LOG_LEVEL:-WARN}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_REAL_NAME: ${BOOTSTRAP_ADMIN_REAL_NAME:-系统管理员}
      JAVA_OPTS: ${JAVA_OPTS:- -Xms256m -Xmx768m}
    volumes:
      - ${HOST_UPLOADS_DATA:-/opt/evidence-manager/data/uploads}:/app/data/uploads
    expose:
      - "8081"
    networks:
      - evidence-net

  nginx:
    image: evidence-manager-frontend:offline
    container_name: evidence-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    networks:
      - evidence-net

networks:
  evidence-net:
    driver: bridge
